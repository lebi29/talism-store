<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TALISM | Luxury Brand</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap');
        
        body, html { 
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #4366F1, #ec4899); 
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* Navigation: Subtle & Refined */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%; position: absolute; width: 90%; top: 0; z-index: 100;
        }
        .nav-logo img { height: 20px; width: auto; }
        .nav-links a { 
            text-decoration: none; color: black; margin-left: 20px; 
            font-size: 11px; font-weight: 300; opacity: 0.5; letter-spacing: 1.5px;
        }

        /* Header Text Area */
        .hero-text {
            display: flex; flex-direction: column; align-items: center;
            text-align: center; padding: 140px 0 60px 0;
        }

        .hero-text h1 { 
            font-family: 'Playfair Display', serif; font-size: 4rem; 
            margin: 0 0 35px 0; color: black; 
        }

        .hero-text p { 
            max-width: 320px; margin: 0 auto 0 auto; 
            line-height: 1.6; font-size: 1.1rem; color: black;
        }

        /* MEDIA SECTION WRAPPER */
        .section-container {
            position: relative;
            width: 100%;
            height: 90vh;
            margin-bottom: 150px;
        }

        .section-container video, .section-container img {
            width: 100%; height: 100%; object-fit: cover;
            display: block;
        }

        /* TEXT OVERLAY ON MEDIA */
        .overlay-content {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.2); /* Soft darkening for readability */
            color: white;
            text-align: center;
        }

        .overlay-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            margin: 0 0 10px 0;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .overlay-content p {
            font-size: 1.1rem;
            margin-bottom: 30px;
            font-weight: 300;
        }

        /* MINI SHOP BUTTONS OVER MEDIA */
        .mini-btn {
            padding: 15px 40px;
            background: white;
            color: black;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s ease;
        }
        
        .mini-btn:hover {
            background: black;
            color: white;
        }

        /* Main Bottom Button Area */
        .button-area {
            display: flex; justify-content: center; padding-bottom: 150px;
        }
        .btn { 
            padding: 26px 95px; background: black; color: white; 
            text-decoration: none; border-radius: 60px; font-weight: 600; 
            font-size: 13px; text-transform: uppercase; letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-logo">
            <img src="logo2.png" alt="TALISM">
        </a>
        <div class="nav-links">
            <a href="about.html">About</a>
            <a href="shop.html">Shop</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <div class="hero-text">
        <h1>TALISM</h1>
        <p>Refined fashion and long-lasting fragrances, crafted for everyday elegance.</p>
    </div>

    <div class="section-container">
        <video autoplay loop muted playsinline>
            <source src="stara-video.mp4" type="video/mp4">
        </video>
        <div class="overlay-content">
            <h2>Stara Clothing</h2>
            <p>Modern modesty, redefined.</p>
            <a href="shop.html#clothing" class="mini-btn">Shop Clothing</a>
        </div>
    </div>

    <div class="section-container">
        <img src="perfume.jpg" alt="Fragrances">
        <div class="overlay-content">
            <h2>Signature Scents</h2>
            <p>Memorable, long-lasting aromas.</p>
            <a href="shop.html#perfume" class="mini-btn">Shop Fragrances</a>
        </div>
    </div>

    <div class="button-area">
        <a href="shop.html" class="btn">Explore Collections</a>
    </div>

</body>
</html>
