<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TALISM | Luxury Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap');
        
        body, html { 
            margin: 0; padding: 0; font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #A978C9, #E9CDCE); 
            background-attachment: fixed; min-height: 100vh;
        }

        /* --- NAVIGATION BAR --- */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5%; position: fixed; top: 0; left: 0; right: 0; z-index: 2000;
            background-color: #E9CDCE; /* Pale Sand Color */
            height: 75px; 
        }
        .nav-logo img { height: 30px; width: auto; display: block; }
        .icon-btn { color: #000; font-size: 20px; cursor: pointer; background: none; border: none; }

        /* --- THEMED DROP-DOWN SEARCH BAR --- */
        #search-dropdown {
            position: fixed; top: -100px; /* Hidden initially */
            left: 0; width: 100%; height: 65px;
            background: #F4EBEB; /* Slightly lighter Sand/White combo */
            z-index: 1999; 
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 5%;
            transition: top 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        #search-dropdown.active { top: 75px; /* Sits below nav */ }
        
        #search-dropdown input {
            width: 90%; padding: 10px 0; font-size: 14px; border: none; 
            outline: none; background: transparent; letter-spacing: 2px;
            font-family: 'Inter', sans-serif; color: #333;
        }
        .close-search { font-size: 18px; cursor: pointer; color: #555; }

        /* --- OTHER ELEMENTS --- */
        .hero-text { text-align: center; padding: 180px 20px 80px 20px; }
        .hero-text h1 { font-family: 'Playfair Display', serif; font-size: 3.8rem; }
        .section { position: relative; width: 100%; height: 80vh; margin-bottom: 60px; overflow: hidden; }
        .section video, .section img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="search-dropdown">
        <input type="text" id="main-search" placeholder="SEARCH TALISM..." onkeypress="handleSearch(event)">
        <span class="close-search" onclick="toggleSearch()"><i class="fa-solid fa-xmark"></i></span>
    </div>

    <nav>
        <div class="nav-left">
            <button class="icon-btn"><i class="fa-solid fa-bars"></i></button>
        </div>
        <div class="nav-center">
            <a href="index.html" class="nav-logo"><img src="logo2.png" alt="TALISM"></a>
        </div>
        <div class="nav-right">
            <button class="icon-btn" onclick="toggleSearch()"><i class="fa-solid fa-magnifying-glass"></i></button>
            <button class="icon-btn"><i class="fa-solid fa-bag-shopping"></i></button>
        </div>
    </nav>

    <div class="hero-text">
        <h1>TALISM</h1>
        <p>Refined fashion and long-lasting fragrances.</p>
    </div>

    <div class="section">
        <video autoplay loop muted playsinline><source src="stara-video.mp4" type="video/mp4"></video>
    </div>

    <script>
        function toggleSearch() {
            const search = document.getElementById('search-dropdown');
            search.classList.toggle('active');
            if(search.classList.contains('active')) {
                setTimeout(() => document.getElementById('main-search').focus(), 400);
            }
        }

        // FUNCTIONALITY: Leads user to the search result
        function handleSearch(event) {
            if (event.key === "Enter") {
                const query = document.getElementById('main-search').value.trim();
                if (query) {
                    // This redirects the user to a search page with their query
                    window.location.href = `search.html?q=${encodeURIComponent(query)}`;
                }
            }
        }
    </script>
</body>
</html>
