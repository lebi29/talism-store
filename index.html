<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TALISM | Luxury Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap');
        
        body, html { 
            margin: 0; padding: 0; font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #A978C9, #E9CDCE); 
            background-attachment: fixed; min-height: 100vh; overflow-x: hidden;
        }

        /* --- 1, 2, 3, 4, 5: FIXED NAVIGATION BAR --- */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; position: fixed; top: 0; left: 0; right: 0; z-index: 2000;
            background-color: #E9CDCE; /* Pale Sand background */
        }
        .nav-left, .nav-right { flex: 1; display: flex; align-items: center; }
        .nav-center { flex: 1; display: flex; justify-content: center; }
        .nav-right { justify-content: flex-end; gap: 20px; }
        .nav-logo img { height: 16px; width: auto; }
        .icon-btn { cursor: pointer; color: #000; font-size: 18px; }

        /* --- SIDEBARS --- */
        .sidebar {
            position: fixed; top: 0; width: 300px; height: 100%;
            background: #fff; z-index: 3000; transition: 0.4s; padding: 80px 30px;
        }
        #menu-sb { left: -350px; }
        #search-sb { right: -350px; width: 100%; }
        #cart-sb { right: -350px; }
        .sidebar.open { left: 0 !important; right: 0 !important; }
        .close-x { position: absolute; top: 20px; right: 20px; font-size: 24px; cursor: pointer; }

        /* --- 6, 7, 8: HOME PAGE CONTENT --- */
        .hero-text { text-align: center; padding: 140px 20px 60px 20px; }
        .hero-text h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; margin-bottom: 10px; }
        .hero-text p { max-width: 300px; margin: 0 auto; line-height: 1.6; font-size: 0.9rem; }

        .section { 
            position: relative; width: 100%; height: 70vh; margin-bottom: 80px; 
            display: flex; justify-content: center; align-items: center; 
        }
        .section video, .section img { position: absolute; width: 100%; height: 100%; object-fit: cover; }

        /* --- 10: WORDS ON IMAGE/VIDEO --- */
        .overlay { position: relative; z-index: 10; text-align: center; color: #fff; }
        .overlay h2 { font-family: 'Playfair Display', serif; font-size: 2.8rem; margin-bottom: 25px; }
        .shop-btn { color: #fff; text-decoration: none; border-bottom: 1px solid #fff; padding-bottom: 5px; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; }

        /* --- 9: EXPLORE BUTTON --- */
        .explore-area { display: flex; justify-content: center; padding: 40px 0 120px 0; }
        .explore-btn { 
            padding: 18px 50px; background: #000; color: #fff; 
            text-decoration: none; border-radius: 50px; font-weight: 600; 
            font-size: 12px; text-transform: uppercase; letter-spacing: 2px;
        }

        #mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 2500; display: none; }
    </style>
</head>
<body>

    <div id="mask" onclick="closeAll()"></div>

    <div id="menu-sb" class="sidebar"><span class="close-x" onclick="closeAll()">&times;</span><a href="#" style="display:block; margin-bottom:20px; text-decoration:none; color:black;">About</a><a href="#" style="text-decoration:none; color:black;">Shop</a></div>
    <div id="search-sb" class="sidebar"><span class="close-x" onclick="closeAll()">&times;</span><h3>Search</h3><input type="text" style="width:90%; padding:10px; border-bottom:1px solid black; border-top:none; border-left:none; border-right:none; outline:none;"></div>
    <div id="cart-sb" class="sidebar"><span class="close-x" onclick="closeAll()">&times;</span><h3>Your Bag</h3><p>Empty</p></div>

    <nav>
        <div class="nav-left"><i class="fa-solid fa-bars icon-btn" onclick="openSB('menu-sb')"></i></div>
        <div class="nav-center"><a href="#" class="nav-logo"><img src="logo2.png" alt="TALISM"></a></div>
        <div class="nav-right">
            <i class="fa-solid fa-magnifying-glass icon-btn" onclick="openSB('search-sb')"></i>
            <i class="fa-solid fa-bag-shopping icon-btn" onclick="openSB('cart-sb')"></i>
        </div>
    </nav>

    <div class="hero-text">
        <h1>TALISM</h1>
        <p>Refined fashion and long-lasting fragrances, crafted for everyday elegance.</p>
    </div>

    <div class="section">
        <video autoplay loop muted playsinline><source src="stara-video.mp4" type="video/mp4"></video>
        <div class="overlay">
            <h2>Stara Clothing</h2>
            <a href="#" class="shop-btn">Shop Now</a>
        </div>
    </div>

    <div class="section">
        <img src="perfume.jpg" alt="Fragrance">
        <div class="overlay">
            <h2>Signature Scents</h2>
            <a href="#" class="shop-btn">Shop Now</a>
        </div>
    </div>

    <div class="explore-area">
        <a href="#" class="explore-btn">Explore Collections</a>
    </div>

    <script>
        function openSB(id) { document.getElementById(id).classList.add('open'); document.getElementById('mask').style.display = 'block'; }
        function closeAll() { const sbs = document.querySelectorAll('.sidebar'); sbs.forEach(s => s.classList.remove('open')); document.getElementById('mask').style.display = 'none'; }
    </script>
</body>
</html>
