<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TALISM | Luxury Brand</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap');
        
        body, html { 
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif; 
            /* THE COLOR COMBO YOU SENT: Transitioning from the Lavender (left) to the Pale Pink (right) */
            background: linear-gradient(135deg, #A978C9 0%, #F3BED6 100%); 
            background-attachment: fixed;
            min-height: 100vh;
        }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%; position: absolute; width: 90%; top: 0; z-index: 100;
        }
        .nav-logo img { height: 20px; width: auto; }
        .nav-links a { 
            text-decoration: none; color: black; margin-left: 20px; 
            font-size: 11px; font-weight: 300; opacity: 0.6; letter-spacing: 1.5px;
        }

        .hero-text {
            display: flex; flex-direction: column; align-items: center;
            text-align: center; padding: 140px 0 60px 0;
        }
        .hero-text h1 { 
            font-family: 'Playfair Display', serif; font-size: 3.5rem; 
            margin: 0 0 35px 0; color: black; 
        }

        /* MEDIA SECTION */
        .section-container {
            position: relative;
            width: 100%;
            height: 90vh; 
            margin-bottom: 200px; /* Massive gap between sections */
            display: flex; justify-content: center; align-items: center;
        }
        .section-container video, .section-container img {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; object-fit: cover;
        }

        /* FIXING THE "WORDS CLOSE TOGETHER" ISSUE */
        .overlay-content {
            position: relative; z-index: 10; text-align: center; color: white;
        }

        .overlay-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: 3.8rem;
            margin: 0 0 100px 0; /* MASSIVE SPACE below Title */
            text-shadow: 2px 2px 15px rgba(0,0,0,0.3);
        }

        .overlay-content p {
            font-size: 1.2rem;
            margin: 0 0 130px 0; /* MASSIVE SPACE below Subtitle */
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* REMOVING WHITE BACKGROUND AND BOUNDARY */
        .mini-btn {
            display: inline-block;
            background: transparent; /* No white background */
            color: white;
            border: none; /* No boundary/border line around the button */
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 4px;
            border-bottom: 2px solid white; /* Just a luxury underline */
            padding-bottom: 10px;
        }
    </style>
</head>
<body>

    <nav>
        <img src="logo2.png" alt="TALISM" class="nav-logo">
        <div class="nav-links">
            <a href="shop.html">Shop</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <div class="hero-text">
        <h1>TALISM</h1>
        <p>Refined fashion and long-lasting fragrances.</p>
    </div>

    <div class="section-container">
        <video autoplay loop muted playsinline>
            <source src="stara-video.mp4" type="video/mp4">
        </video>
        <div class="overlay-content">
            <h2>Stara Clothing</h2>
            <p>Modern modesty, redefined.</p>
            <a href="shop.html" class="mini-btn">Shop Now</a>
        </div>
    </div>

</body>
</html>
