<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TALISM | Luxury Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap');
        
        body, html { 
            margin: 0; padding: 0; font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #A978C9, #E9CDCE); 
            background-attachment: fixed; min-height: 100vh; overflow-x: hidden;
        }

        /* --- NAVIGATION BAR --- */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; position: fixed; top: 0; left: 0; right: 0; z-index: 2000;
            background-color: #E9CDCE; /* Pale Sand background from palette */
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
        }

        /* Fixed Width Containers to force perfect center logo */
        .nav-left, .nav-right { flex: 1; display: flex; align-items: center; }
        .nav-center { flex: 2; display: flex; justify-content: center; }

        .icon-btn { cursor: pointer; color: #000; font-size: 20px; transition: 0.3s; }
        .nav-right { justify-content: flex-end; gap: 25px; }
        .nav-logo img { height: 18px; width: auto; }

        /* --- FUNCTIONAL SIDEBARS --- */
        .sidebar {
            position: fixed; top: 0; width: 320px; height: 100%;
            background: #fff; z-index: 3000; transition: 0.5s cubic-bezier(0.77,0.2,0.05,1.0);
            padding: 80px 40px; box-shadow: 0 0 30px rgba(0,0,0,0.1);
        }
        #menu-sidebar { left: -380px; }
        #search-sidebar { right: -380px; width: 100%; } /* Search slides from right */
        #cart-sidebar { right: -380px; }

        .sidebar.open { left: 0 !important; right: 0 !important; }
        .close-icon { position: absolute; top: 25px; right: 30px; font-size: 24px; cursor: pointer; }
        
        .sidebar-links a { 
            display: block; text-decoration: none; color: #000; 
            margin-bottom: 30px; font-size: 14px; text-transform: uppercase; 
            letter-spacing: 2.5px; font-weight: 500;
        }

        /* Search Layout */
        .search-field {
            width: 100%; border: none; border-bottom: 1px solid #000;
            padding: 15px 0; font-size: 22px; font-family: 'Playfair Display', serif; outline: none;
        }

        /* --- CONTENT AREA --- */
        .hero-text { text-align: center; padding: 180px 20px 80px 20px; }
        .hero-text h1 { font-family: 'Playfair Display', serif; font-size: 3.8rem; margin: 0; letter-spacing: 5px; }

        .section { position: relative; width: 100%; height: 85vh; margin-bottom: 120px; display: flex; justify-content: center; align-items: center; }
        .section video, .section img { position: absolute; width: 100%; height: 100%; object-fit: cover; }
        
        .overlay { position: relative; z-index: 10; text-align: center; color: #fff; }
        .overlay h2 { font-family: 'Playfair Display', serif; font-size: 3.5rem; margin-bottom: 50px; text-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .shop-btn { color: #fff; text-decoration: none; border-bottom: 2px solid #fff; padding-bottom: 8px; font-size: 13px; letter-spacing: 4px; text-transform: uppercase; }

        /* Dark Overlay when sidebar is active */
        #page-mask {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); z-index: 2500; display: none;
        }
    </style>
</head>
<body>

    <div id="page-mask" onclick="closeAll()"></div>

    <div id="menu-sidebar" class="sidebar">
        <span class="close-icon" onclick="closeAll()">&times;</span>
        <div class="sidebar-links">
            <a href="about.html">Our Story</a>
            <a href="shop.html">Stara Clothing</a>
            <a href="shop.html#scents">Signature Scents</a>
            <a href="contact.html">Contact</a>
        </div>
    </div>

    <div id="search-sidebar" class="sidebar">
        <span class="close-icon" onclick="closeAll()">&times;</span>
        <h3 style="letter-spacing: 3px; font-size: 12px; margin-bottom: 40px;">SEARCH TALISM</h3>
        <input type="text" class="search-field" placeholder="What are you looking for?">
    </div>

    <div id="cart-sidebar" class="sidebar">
        <span class="close-icon" onclick="closeAll()">&times;</span>
        <h3 style="letter-spacing: 3px; font-size: 12px;">YOUR SHOPPING BAG</h3>
        <p style="margin-top: 50px; color: #888; font-size: 13px;">Your bag is empty.</p>
    </div>

    <nav>
        <div class="nav-left">
            <i class="fa-solid fa-bars icon-btn" onclick="openSidebar('menu-sidebar')"></i>
        </div>
        <div class="nav-center">
            <a href="index.html" class="nav-logo">
                <img src="logo2.png" alt="TALISM">
            </a>
        </div>
        <div class="nav-right">
            <i class="fa-solid fa-magnifying-glass icon-btn" onclick="openSidebar('search-sidebar')"></i>
            <i class="fa-solid fa-bag-shopping icon-btn" onclick="openSidebar('cart-sidebar')"></i>
        </div>
    </nav>

    <div class="hero-text">
        <h1>TALISM</h1>
        <p>Refined fashion and long-lasting fragrances.</p>
    </div>

    <div class="section">
        <video autoplay loop muted playsinline>
            <source src="stara-video.mp4" type="video/mp4">
        </video>
        <div class="overlay">
            <h2>Stara Clothing</h2>
            <a href="shop.html" class="shop-btn">Shop Now</a>
        </div>
    </div>

    <script>
        function openSidebar(id) {
            document.getElementById(id).classList.add('open');
            document.getElementById('page-mask').style.display = 'block';
        }
        function closeAll() {
            const sidebars = document.querySelectorAll('.sidebar');
            sidebars.forEach(s => s.classList.remove('open'));
            document.getElementById('page-mask').style.display = 'none';
        }
    </script>

</body>
</html>
