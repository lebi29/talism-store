<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TALISM | Luxury Brand</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap');
        
        body, html { 
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #4366F1, #ec4899); 
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* 1 & 5. Subtle Nav and Small Logo */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%; position: absolute; width: 90%; top: 0; z-index: 100;
        }
        .nav-logo img { height: 22px; width: auto; }
        .nav-links a { 
            text-decoration: none; color: black; margin-left: 20px; 
            font-size: 11px; font-weight: 300; opacity: 0.5; letter-spacing: 1.5px;
        }

        .container {
            display: flex; flex-direction: column; align-items: center;
            text-align: center; padding: 120px 0 100px 0;
        }

        .hero-text h1 { 
            font-family: 'Playfair Display', serif; font-size: 4rem; 
            margin: 0 0 30px 0; color: black; 
        }

        .hero-text p { 
            max-width: 320px; margin: 0 auto 80px auto; 
            line-height: 1.6; font-size: 1.1rem; color: black;
        }

        /* Full Size Media Sections */
        .full-media {
            width: 100%;
            height: 80vh; /* High-impact full size */
            margin-bottom: 120px; /* Large margin to separate image from video */
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        }

        .full-media img, .full-media video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 4. Heavy Hand Button */
        .btn { 
            padding: 25px 90px; background: black; color: white; 
            text-decoration: none; border-radius: 60px; font-weight: 600; 
            font-size: 13px; text-transform: uppercase; letter-spacing: 3px;
            display: inline-block; margin-top: 40px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-logo">
            <img src="logo2.png" alt="TALISM">
        </a>
        <div class="nav-links">
            <a href="about.html">About</a>
            <a href="shop.html">Shop</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <div class="container">
        <div class="hero-text">
            <h1>TALISM</h1>
            <p>Refined fashion and long-lasting fragrances, crafted for everyday elegance.</p>
        </div>

        <div class="full-media">
            <img src="perfume.jpg" alt="Fragrances">
        </div>

        <div class="full-media">
            <video autoplay loop muted playsinline>
                <source src="stara-video.mp4" type="video/mp4">
            </video>
        </div>

        <a href="shop.html" class="btn">Explore Collections</a>
    </div>

</body>
</html>
