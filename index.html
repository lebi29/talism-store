<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TALISM | Luxury Brand</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap');
        
        body, html { 
            margin: 0; padding: 0; font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #A978C9, #E9CDCE); 
            background-attachment: fixed; min-height: 100vh; overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        nav {
            display: grid; grid-template-columns: 1fr 1fr 1fr; align-items: center;
            padding: 20px 5%; position: fixed; width: 90%; top: 0; z-index: 1000;
        }

        .menu-trigger, .nav-icons { cursor: pointer; color: black; font-size: 20px; }
        .menu-trigger { justify-self: start; }
        .nav-logo { justify-self: center; }
        .nav-logo img { height: 16px; width: auto; }
        .nav-icons { justify-self: end; display: flex; gap: 20px; }

        /* --- SIDEBARS (Menu, Search, Cart) --- */
        .sidebar {
            position: fixed; top: 0; width: 280px; height: 100%;
            background: white; z-index: 2000; transition: 0.5s cubic-bezier(0.77,0.2,0.05,1.0);
            padding: 60px 30px; box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        #side-menu { left: -350px; }
        #side-search { right: -350px; width: 100%; } /* Search covers top */
        #side-cart { right: -350px; }

        .sidebar.active { left: 0 !important; right: 0 !important; }

        .close-btn { 
            position: absolute; top: 20px; right: 20px; font-size: 24px; cursor: pointer; 
        }

        .sidebar a, .sidebar h3 {
            display: block; text-decoration: none; color: black;
            margin-bottom: 30px; font-size: 14px; text-transform: uppercase; letter-spacing: 2px;
        }

        /* Search Input Style */
        .search-box {
            width: 80%; padding: 15px; border: none; border-bottom: 1px solid #ccc;
            font-size: 18px; outline: none; margin-top: 20px;
        }

        /* --- CONTENT AREA --- */
        .hero-text {
            text-align: center; padding: 160px 20px 80px 20px;
        }
        .hero-text h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; margin: 0 0 20px 0; }

        .section-container {
            position: relative; width: 100%; height: 75vh; margin-bottom: 100px;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
        }
        .section-container img, .section-container video {
            position: absolute; width: 100%; height: 100%; object-fit: cover;
        }

        .overlay-content { position: relative; z-index: 10; text-align: center; color: white; }
        .overlay-content h2 { font-family: 'Playfair Display', serif; font-size: 3rem; margin-bottom: 40px; }
        
        .mini-btn {
            color: white; text-decoration: none; font-size: 12px; letter-spacing: 3px;
            border-bottom: 1px solid white; padding-bottom: 5px; text-transform: uppercase;
        }

        #overlay-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); z-index: 1500; display: none;
        }
    </style>
</head>
<body>

    <div id="overlay-bg" onclick="closeAll()"></div>

    <div id="side-menu" class="sidebar">
        <span class="close-btn" onclick="closeAll()">&times;</span>
        <a href="about.html">About</a>
        <a href="shop.html">Shop Clothing</a>
        <a href="shop.html#perfume">Shop Fragrances</a>
        <a href="contact.html">Contact</a>
    </div>

    <div id="side-search" class="sidebar">
        <span class="close-btn" onclick="closeAll()">&times;</span>
        <h3>Search TALISM</h3>
        <input type="text" class="search-box" placeholder="What are you looking for?">
    </div>

    <div id="side-cart" class="sidebar">
        <span class="close-btn" onclick="closeAll()">&times;</span>
        <h3>Your Shopping Bag</h3>
        <p style="font-size: 12px; color: #666; margin-top: 40px;">Your bag is currently empty.</p>
    </div>

    <nav>
        <div class="menu-trigger" onclick="openSidebar('side-menu')">
            <i class="fa-solid fa-bars"></i> </div>
        <div class="nav-logo">
            <img src="logo2.png" alt="TALISM">
        </div>
        <div class="nav-icons">
            <i class="fa-solid fa-magnifying-glass" onclick="openSidebar('side-search')"></i>
            <i class="fa-solid fa-bag-shopping" onclick="openSidebar('side-cart')"></i>
        </div>
    </nav>

    <div class="hero-text">
        <h1>TALISM</h1>
        <p>Refined fashion and long-lasting fragrances.</p>
    </div>

    <div class="section-container">
        <video autoplay loop muted playsinline>
            <source src="stara-video.mp4" type="video/mp4">
        </video>
        <div class="overlay-content">
            <h2>Stara Clothing</h2>
            <a href="shop.html" class="mini-btn">Shop Now</a>
        </div>
    </div>

    <script>
        function openSidebar(id) {
            document.getElementById(id).classList.add('active');
            document.getElementById('overlay-bg').style.display = 'block';
        }

        function closeAll() {
            const sidebars = document.querySelectorAll('.sidebar');
            sidebars.forEach(s => s.classList.remove('active'));
            document.getElementById('overlay-bg').style.display = 'none';
        }
    </script>

</body>
</html>
