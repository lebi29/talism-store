<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TALISM | Luxury Brand</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap');
        
        body, html { 
            margin: 0; 
            padding: 0;
            font-family: 'Inter', sans-serif; 
            background: #fff; 
            height: 100%;
            overflow: hidden;
        }

        /* 5. Navigation: Reduced weight and opacity */
        nav {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 20px 5%; 
            position: absolute;
            width: 90%; 
            top: 0; 
            left: 0; 
            z-index: 100;
        }

        /* 1. Smaller Logo Size */
        .nav-logo img {
            height: 24px; 
            width: auto;
        }

        .nav-links a { 
            text-decoration: none; 
            color: black; 
            margin-left: 20px; 
            font-size: 12px; 
            font-weight: 300; /* Low font weight */
            opacity: 0.6;    /* Lowered attention */
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* 3. Full Screen Background Style */
        .hero {
            height: 100vh; 
            width: 100%;
            display: flex; 
            flex-direction: column; 
            justify-content: center;
            align-items: center; 
            text-align: center;
            position: relative;
        }

        .hero-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* Soft overlay to ensure readability */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.15);
            z-index: 2;
        }

        .hero-content {
            position: relative;
            z-index: 3;
            padding: 20px;
        }

        /* 2. Headline & Spacing Improvements */
        .hero h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: 4.2rem; 
            margin: 0 0 35px 0; /* Increased margin bottom */
            color: black; 
            letter-spacing: -2px;
        }

        .hero p { 
            max-width: 340px; 
            margin: 0 auto 55px auto; 
            line-height: 1.6; 
            font-size: 1.1rem; 
            color: black; 
            font-weight: 400; 
        }

        /* 4. Heavy Hand Padding on Button */
        .btn { 
            padding: 24px 75px; /* Large, confident padding */
            background: black; 
            color: white; 
            text-decoration: none; 
            border-radius: 60px; 
            font-weight: 600; 
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            transition: 0.4s ease;
            display: inline-block;
        }

        .btn:hover {
            transform: scale(1.05);
            background: #222;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-logo">
            <img src="logo2.png" alt="TALISM">
        </a>
        <div class="nav-links">
            <a href="about.html">About</a>
            <a href="shop.html">Shop</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <header class="hero">
        <video autoplay loop muted playsinline class="hero-video">
            <source src="stara-video.mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>

        <div class="hero-content">
            <h1>TALISM</h1>
            <p>Refined fashion and long-lasting fragrances, crafted for everyday elegance.</p>
            <a href="shop.html" class="btn">Explore Collections</a>
        </div>
    </header>

</body>
</html>
