<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TALISM | Luxury Brand</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap');
        
        body, html { 
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif; 
            /* THE EXACT COLOR COMBO: Lavender to Pale Sand from Image 2 */
            background: linear-gradient(135deg, #A978C9, #E9CDCE); 
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
        }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; position: absolute; width: 90%; top: 0; z-index: 100;
        }
        .nav-logo img { height: 18px; width: auto; }
        .nav-links a { 
            text-decoration: none; color: black; margin-left: 15px; 
            font-size: 10px; font-weight: 400; opacity: 0.6; letter-spacing: 1px;
        }

        /* Fixed Hero Area */
        .hero-text {
            display: flex; flex-direction: column; align-items: center;
            text-align: center; padding: 100px 20px 40px 20px;
        }
        .hero-text h1 { 
            font-family: 'Playfair Display', serif; font-size: 3rem; 
            margin: 0 0 15px 0; color: black; 
        }
        .hero-text p { 
            max-width: 280px; line-height: 1.5; font-size: 0.9rem; color: black; margin: 0;
        }

        /* Fixed Section Container to prevent text overflow */
        .section-container {
            position: relative;
            width: 100%;
            height: 70vh; 
            margin-bottom: 80px;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }
        .section-container video, .section-container img {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; object-fit: cover; z-index: 1;
        }

        /* SAFE SPACING: Increased gaps without breaking the layout */
        .overlay-content {
            position: relative; z-index: 10; text-align: center; color: white; width: 85%;
        }

        .overlay-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            margin: 0 0 30px 0; /* Clear gap below title */
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }

        .overlay-content p {
            font-size: 1rem;
            margin: 0 0 45px 0; /* Clear gap below subtitle */
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* REFINED BUTTON: No boundary, just elegant underlined text */
        .mini-btn {
            display: inline-block;
            background: transparent;
            color: white;
            border: none;
            text-decoration: none;
            font-weight: 500;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-bottom: 1px solid white; 
            padding-bottom: 6px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-logo">
            <img src="logo2.png" alt="TALISM">
        </a>
        <div class="nav-links">
            <a href="shop.html">Shop</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <div class="hero-text">
        <h1>TALISM</h1>
        <p>Refined fashion and long-lasting fragrances.</p>
    </div>

    <div class="section-container">
        <video autoplay loop muted playsinline>
            <source src="stara-video.mp4" type="video/mp4">
        </video>
        <div class="overlay-content">
            <h2>Stara Clothing</h2>
            <p>Modern modesty, redefined.</p>
            <a href="shop.html" class="mini-btn">Shop Now</a>
        </div>
    </div>

    <div class="section-container">
        <img src="perfume.jpg" alt="Fragrances">
        <div class="overlay-content">
            <h2>Signature Scents</h2>
            <p>Memorable, long-lasting aromas.</p>
            <a href="shop.html" class="mini-btn">Shop Now</a>
        </div>
    </div>

</body>
</html>
