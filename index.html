<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TALISM | Luxury Brand</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap');
        
        body, html { 
            margin: 0; 
            padding: 0;
            font-family: 'Inter', sans-serif; 
            /* Keeping your signature blue-to-purple gradient */
            background: linear-gradient(135deg, #4366F1, #ec4899); 
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Navigation: Light & Subtle */
        nav {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 20px 5%; 
            position: absolute;
            width: 90%; 
            top: 0; 
            z-index: 100;
        }

        .nav-logo img { height: 24px; width: auto; }

        .nav-links a { 
            text-decoration: none; 
            color: black; 
            margin-left: 20px; 
            font-size: 12px; 
            font-weight: 300; 
            opacity: 0.6;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .hero {
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center;
            padding: 120px 0 80px 0;
        }

        .hero h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: 4rem; 
            margin: 0 0 30px 0; 
            color: black; 
            letter-spacing: -1px;
        }

        .hero p { 
            max-width: 320px; 
            margin: 0 auto 60px auto; 
            line-height: 1.6; 
            font-size: 1.1rem; 
            color: black;
        }

        /* Media Section: Large but allows background to show around it */
        .media-container {
            width: 100%;
            height: 65vh; 
            display: flex;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
            /* Pushing the button down further */
            margin-bottom: 100px; 
        }

        .media-item {
            width: 50%; 
            height: 100%;
            object-fit: cover;
        }

        /* Heavy-Hand Button */
        .btn { 
            padding: 25px 85px; 
            background: black; 
            color: white; 
            text-decoration: none; 
            border-radius: 60px; 
            font-weight: 600; 
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s ease;
            display: inline-block;
        }

        /* Mobile View: Stack video and image */
        @media (max-width: 600px) {
            .media-container { height: 60vh; flex-direction: column; margin-bottom: 80px; }
            .media-item { width: 100%; height: 50%; }
            .hero h1 { font-size: 3.2rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-logo">
            <img src="logo2.png" alt="TALISM">
        </a>
        <div class="nav-links">
            <a href="about.html">About</a>
            <a href="shop.html">Shop</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <header class="hero">
        <h1>TALISM</h1>
        <p>Refined fashion and long-lasting fragrances, crafted for everyday elegance.</p>

        <div class="media-container">
            <img src="perfume.jpg" class="media-item" alt="Fragrances">
            <video autoplay loop muted playsinline class="media-item">
                <source src="stara-video.mp4" type="video/mp4">
            </video>
        </div>

        <a href="shop.html" class="btn">Explore Collections</a>
    </header>

</body>
</html>
