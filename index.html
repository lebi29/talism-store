<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TALISM | Luxury Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap');
        
        body, html { 
            margin: 0; padding: 0; font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #A978C9, #E9CDCE); 
            background-attachment: fixed; min-height: 100vh; overflow-x: hidden;
        }

        /* --- NAVIGATION BAR --- */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; /* Adjusted padding */
            position: fixed; top: 0; left: 0; right: 0; z-index: 3000;
            background-color: #E9CDCE; /* Pale Sand */
            height: 75px; 
            border: none; /* Ensuring no nav borders */
        }
        
        .nav-left { flex: 1; display: flex; justify-content: flex-start; }
        .nav-center { flex: 2; display: flex; justify-content: center; }
        .nav-right { flex: 1; display: flex; justify-content: flex-end; gap: 20px; }

        .nav-logo img { height: 32px; width: auto; display: block; } 
        .icon-btn { color: #000; font-size: 22px; cursor: pointer; background: none; border: none; padding: 5px; }

        /* --- THEMED DROP-DOWN SEARCH --- */
        #search-dropdown {
            position: fixed; top: -100px; left: 0; width: 100%; height: 65px;
            background: #F4EBEB; z-index: 2999; display: flex; align-items: center; justify-content: space-between;
            padding: 0 5%; transition: top 0.4s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        #search-dropdown.active { top: 75px; }
        #search-dropdown input { width: 90%; border: none; outline: none; background: transparent; font-size: 14px; letter-spacing: 2px; }

        /* --- SIDEBAR FIXED: REMOVING THE "DENSE LINE" --- */
        #menu-sb { 
            position: fixed; top: 0; 
            left: -350px; /* Moved further out to hide shadows/borders completely */
            width: 300px; height: 100%; 
            background: #F4EBEB; z-index: 4000; transition: 0.4s ease-in-out; padding: 80px 30px; 
            display: flex; flex-direction: column;
            border: none; /* Explicitly remove any side borders */
            box-shadow: none; /* Remove shadow when closed */
        }
        /* Only apply shadow when the menu is actually open */
        #menu-sb.open { left: 0; box-shadow: 10px 0 30px rgba(0,0,0,0.15); }

        .sb-link {
            display: block; text-decoration: none; color: #000; font-size: 13px;
            letter-spacing: 2px; margin-bottom: 25px; font-weight: 500; transition: 0.3s;
        }
        .sb-link:hover { opacity: 0.5; }
        .sb-divider { border: 0; border-top: 1px solid rgba(0,0,0,0.05); margin: 20px 0 30px; }

        /* --- CONTENT & SPACING --- */
        .hero-text { text-align: center; padding: 180px 20px 80px 20px; color: #000; }
        .hero-text h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; margin: 0; }
        .hero-text p { font-size: 0.9rem; max-width: 320px; margin: 15px auto 0; line-height: 1.6; }

        .section { 
            position: relative; width: 100%; height: 80vh; 
            margin-bottom: 120px; /* Luxury spacing */
            display: flex; justify-content: center; align-items: center; overflow: hidden; 
        }
        .section video, .section img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }

        .overlay { position: relative; z-index: 10; text-align: center; color: #fff; padding: 20px; }
        .overlay h2 { font-family: 'Playfair Display', serif; font-size: 3rem; margin-bottom: 15px; text-shadow: 0 2px 15px rgba(0,0,0,0.4); }
        .shop-btn { color: #fff; text-decoration: none; border-bottom: 2px solid #fff; padding-bottom: 5px; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; }

        .explore-area { display: flex; justify-content: center; padding: 20px 0 120px; }
        .explore-btn { padding: 20px 60px; background: #000; color: #fff; text-decoration: none; border-radius: 50px; font-weight: 600; font-size: 12px; letter-spacing: 2px; }

        #mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 3500; display: none; }
    </style>
</head>
<body>

    <div id="mask" onclick="closeMenu()"></div>

    <div id="menu-sb">
        <span style="position: absolute; top: 20px; right: 20px; font-size: 24px; cursor: pointer;" onclick="closeMenu()">&times;</span>
        <a href="shop.html?cat=new" class="sb-link">NEW ARRIVALS</a>
        <a href="shop.html?cat=stara" class="sb-link">STARA CLOTHING</a>
        <a href="shop.html?cat=scents" class="sb-link">SIGNATURE SCENTS</a>
        <a href="shop.html?cat=acc" class="sb-link">ACCESSORIES</a>
        <hr class="sb-divider">
        <a href="about.html" class="sb-link">ABOUT TALISM</a>
        <a href="craft.html" class="sb-link">OUR CRAFTSMANSHIP</a>
    </div>

    <div id="search-dropdown">
        <input type="text" id="main-search" placeholder="SEARCH TALISM..." onkeypress="handleSearch(event)">
        <span class="icon-btn" onclick="toggleSearch()"><i class="fa-solid fa-xmark"></i></span>
    </div>

    <nav>
        <div class="nav-left">
            <button class="icon-btn" onclick="openMenu()"><i class="fa-solid fa-bars"></i></button>
        </div>
        <div class="nav-center">
            <a href="index.html" class="nav-logo"><img src="logo2.png" alt="TALISM"></a>
        </div>
        <div class="nav-right">
            <button class="icon-btn" onclick="toggleSearch()"><i class="fa-solid fa-magnifying-glass"></i></button>
            <button class="icon-btn"><i class="fa-solid fa-bag-shopping"></i></button>
        </div>
    </nav>

    <div class="hero-text">
        <h1>TALISM</h1>
        <p>Refined fashion and long-lasting fragrances, crafted for everyday elegance.</p>
    </div>

    <div class="section">
        <video autoplay loop muted playsinline><source src="stara-video.mp4" type="video/mp4"></video>
        <div class="overlay">
            <h2>Stara Clothing</h2>
            <a href="shop.html" class="shop-btn">SHOP NOW</a>
        </div>
    </div>

    <div class="section">
        <img src="perfume.jpg" alt="Fragrance">
        <div class="overlay">
            <h2>Signature Scents</h2>
            <a href="shop.html" class="shop-btn">SHOP NOW</a>
        </div>
    </div>

    <div class="explore-area">
        <a href="shop.html" class="explore-btn">Explore Collections</a>
    </div>

    <script>
        function openMenu() { document.getElementById('menu-sb').classList.add('open'); document.getElementById('mask').style.display = 'block'; }
        function closeMenu() { document.getElementById('menu-sb').classList.remove('open'); document.getElementById('mask').style.display = 'none'; }
        
        function toggleSearch() {
            const search = document.getElementById('search-dropdown');
            search.classList.toggle('active');
            if(search.classList.contains('active')) {
                setTimeout(() => document.getElementById('main-search').focus(), 300);
            }
        }

        function handleSearch(event) {
            if (event.key === "Enter") {
                const query = document.getElementById('main-search').value.trim();
                if (query) window.location.href = `search.html?q=${encodeURIComponent(query)}`;
            }
        }
    </script>
</body>
</html>
