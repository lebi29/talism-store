<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TALISM | Luxury Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap');
        
        body, html { 
            margin: 0; padding: 0; font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #A978C9, #E9CDCE); 
            background-attachment: fixed; min-height: 100vh; overflow-x: hidden;
        }

        /* --- NAVIGATION BAR --- */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 5%; position: fixed; top: 0; left: 0; right: 0; z-index: 2000;
            background-color: #E9CDCE; /* Pale Sand background */
            height: 75px; 
        }
        .nav-left, .nav-right { flex: 1; display: flex; align-items: center; }
        .nav-center { flex: 2; display: flex; justify-content: center; }
        .nav-right { justify-content: flex-end; gap: 25px; }

        /* Larger Logo */
        .nav-logo img { height: 30px; width: auto; display: block; }
        
        .icon-btn { color: #000; font-size: 20px; cursor: pointer; background: none; border: none; }

        /* --- NEW SEARCH OVERLAY (Fixes 404 Error) --- */
        #search-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            z-index: 4000; display: none; flex-direction: column;
            align-items: center; justify-content: center;
        }
        #search-overlay input {
            width: 80%; max-width: 600px; padding: 20px;
            font-size: 24px; border: none; border-bottom: 2px solid #000;
            outline: none; font-family: 'Inter', sans-serif; background: transparent;
        }
        .close-search { position: absolute; top: 30px; right: 5%; font-size: 30px; cursor: pointer; }

        /* LEFT MENU SIDEBAR */
        #menu-sb { 
            position: fixed; top: 0; left: -350px; width: 300px; height: 100%; 
            background: #fff; z-index: 3000; transition: 0.4s; padding: 80px 30px; 
        }
        #menu-sb.open { left: 0; }

        /* CONTENT STYLING */
        .hero-text { text-align: center; padding: 180px 20px 80px 20px; }
        .hero-text h1 { font-family: 'Playfair Display', serif; font-size: 3.8rem; margin-bottom: 10px; }
        .section { position: relative; width: 100%; height: 80vh; margin-bottom: 60px; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .section video, .section img { position: absolute; width: 100%; height: 100%; object-fit: cover; }
        .overlay { position: relative; z-index: 10; text-align: center; color: #fff; }
        .overlay h2 { font-family: 'Playfair Display', serif; font-size: 3.2rem; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        .shop-btn { color: #fff; text-decoration: none; border-bottom: 2px solid #fff; padding-bottom: 5px; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; }
        
        #mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 2500; display: none; }
    </style>
</head>
<body>

    <div id="mask" onclick="closeMenu()"></div>
    
    <div id="search-overlay">
        <span class="close-search" onclick="closeSearch()">&times;</span>
        <input type="text" placeholder="Search TALISM...">
    </div>

    <div id="menu-sb">
        <span style="position: absolute; top: 20px; right: 20px; font-size: 24px; cursor: pointer;" onclick="closeMenu()">&times;</span>
        <a href="#" style="display:block; margin-bottom:30px; text-decoration:none; color:black; letter-spacing:2px;">ABOUT</a>
        <a href="#" style="display:block; text-decoration:none; color:black; letter-spacing:2px;">SHOP</a>
    </div>

    <nav>
        <div class="nav-left">
            <button class="icon-btn" onclick="openMenu()"><i class="fa-solid fa-bars"></i></button>
        </div>
        <div class="nav-center">
            <a href="index.html" class="nav-logo"><img src="logo2.png" alt="TALISM"></a>
        </div>
        <div class="nav-right">
            <button class="icon-btn" onclick="openSearch()"><i class="fa-solid fa-magnifying-glass"></i></button>
            <button class="icon-btn"><i class="fa-solid fa-bag-shopping"></i></button>
        </div>
    </nav>

    <div class="hero-text">
        <h1>TALISM</h1>
        <p>Refined fashion and long-lasting fragrances, crafted for everyday elegance.</p>
    </div>

    <div class="section">
        <video autoplay loop muted playsinline><source src="stara-video.mp4" type="video/mp4"></video>
        <div class="overlay">
            <h2>Stara Clothing</h2>
            <a href="#" class="shop-btn">SHOP NOW</a>
        </div>
    </div>

    <script>
        function openMenu() { document.getElementById('menu-sb').classList.add('open'); document.getElementById('mask').style.display = 'block'; }
        function closeMenu() { document.getElementById('menu-sb').classList.remove('open'); document.getElementById('mask').style.display = 'none'; }
        
        // Fixes the 404 error by showing an overlay instead of linking to a dead page
        function openSearch() { document.getElementById('search-overlay').style.display = 'flex'; }
        function closeSearch() { document.getElementById('search-overlay').style.display = 'none'; }
    </script>
</body>
</html>
