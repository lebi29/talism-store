<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TALISM | Luxury Brand</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap');
        
        body, html { 
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #4366F1, #ec4899); 
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* 1 & 5. Subtle Nav and Small Logo */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%; position: absolute; width: 90%; top: 0; z-index: 100;
        }
        .nav-logo img { height: 20px; width: auto; }
        .nav-links a { 
            text-decoration: none; color: black; margin-left: 20px; 
            font-size: 11px; font-weight: 300; opacity: 0.5; letter-spacing: 1.5px;
        }

        /* Hero Text Area */
        .hero-text {
            display: flex; flex-direction: column; align-items: center;
            text-align: center; padding: 140px 0 60px 0;
        }

        .hero-text h1 { 
            font-family: 'Playfair Display', serif; font-size: 4rem; 
            margin: 0 0 35px 0; color: black; 
        }

        .hero-text p { 
            max-width: 320px; margin: 0 auto 0 auto; 
            line-height: 1.6; font-size: 1.1rem; color: black;
        }

        /* FULL SIZE IMAGE SECTION */
        .section-image {
            width: 100%;
            height: 90vh; /* Almost full screen height */
            margin-top: 80px;
            margin-bottom: 150px; /* HUGE GAP to separate from video */
        }
        .section-image img {
            width: 100%; height: 100%; object-fit: cover;
            display: block;
        }

        /* FULL SIZE VIDEO SECTION */
        .section-video {
            width: 100%;
            height: 90vh; /* Almost full screen height */
            margin-bottom: 150px; /* HUGE GAP to separate from button */
        }
        .section-video video {
            width: 100%; height: 100%; object-fit: cover;
            display: block;
        }

        /* 4. Heavy Hand Button */
        .button-area {
            display: flex; justify-content: center; padding-bottom: 150px;
        }
        .btn { 
            padding: 26px 95px; background: black; color: white; 
            text-decoration: none; border-radius: 60px; font-weight: 600; 
            font-size: 13px; text-transform: uppercase; letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-logo">
            <img src="logo2.png" alt="TALISM">
        </a>
        <div class="nav-links">
            <a href="about.html">About</a>
            <a href="shop.html">Shop</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <div class="hero-text">
        <h1>TALISM</h1>
        <p>Refined fashion and long-lasting fragrances, crafted for everyday elegance.</p>
    </div>

    <div class="section-image">
        <img src="perfume.jpg" alt="Fragrances">
    </div>

    <div class="section-video">
        <video autoplay loop muted playsinline>
            <source src="stara-video.mp4" type="video/mp4">
        </video>
    </div>

    <div class="button-area">
        <a href="shop.html" class="btn">Explore Collections</a>
    </div>

</body>
</html>
