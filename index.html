<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TALISM | Luxury Brand</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap');
        
        body, html { 
            margin: 0; 
            padding: 0;
            font-family: 'Inter', sans-serif; 
            background: #fff; 
            height: 100%;
            overflow-x: hidden;
        }

        /* 5. Refined Navigation */
        nav {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 20px 5%; 
            position: absolute;
            width: 90%; 
            top: 0; 
            left: 0; 
            z-index: 100;
        }

        /* 1. Smaller Logo Size */
        .nav-logo img {
            height: 30px; 
            width: auto;
            opacity: 0.9;
        }

        /* 5. Reduced weight and opacity for Nav Links */
        .nav-links a { 
            text-decoration: none; 
            color: black; 
            margin-left: 20px; 
            font-size: 13px; 
            font-weight: 300; 
            opacity: 0.7;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* 3. Full Screen Background Style */
        .hero {
            height: 100vh; 
            width: 100%;
            display: flex; 
            flex-direction: column; 
            justify-content: center;
            align-items: center; 
            text-align: center;
            position: relative;
            background: linear-gradient(135deg, #4366F1, #ec4899); /* Placeholder if video fails */
        }

        /* Video Background */
        .hero-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2; /* Sits on top of video */
            padding: 20px;
        }

        .hero h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: 4.5rem; 
            margin: 0; 
            color: black; 
            letter-spacing: -2px;
        }

        /* 2. Increased Space (Margin Bottom) */
        .hero h1 {
            margin-bottom: 25px; 
        }

        .hero p { 
            max-width: 350px; 
            margin: 0 auto 50px auto; 
            line-height: 1.6; 
            font-size: 1.1rem; 
            color: black; 
            font-weight: 400; 
            opacity: 0.9;
        }

        /* 4. Heavy Hand Padding on Button */
        .btn { 
            padding: 22px 60px; 
            background: black; 
            color: white; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: 600; 
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s;
            display: inline-block;
        }

        .btn:hover {
            transform: scale(1.05);
            background: #222;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-logo">
            <img src="logo2.png" alt="TALISM Logo">
        </a>
        <div class="nav-links">
            <a href="about.html">About</a>
            <a href="shop.html">Shop</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <header class="hero">
        <video autoplay loop muted playsinline class="hero-video">
            <source src="stara-video.mp4" type="video/mp4">
        </video>

        <div class="hero-content">
            <h1>TALISM</h1>
            <p>Refined fashion and long-lasting fragrances, crafted for everyday elegance.</p>
            <a href="shop.html" class="btn">Explore Collections</a>
        </div>
    </header>

</body>
</html>
