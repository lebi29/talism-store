<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TALISM | Luxury Brand</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap');
        
        body, html { 
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #4366F1, #ec4899); 
            background-attachment: fixed;
            min-height: 100vh;
        }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%; position: absolute; width: 90%; top: 0; z-index: 100;
        }
        .nav-logo img { height: 20px; width: auto; }
        .nav-links a { 
            text-decoration: none; color: black; margin-left: 20px; 
            font-size: 11px; font-weight: 300; opacity: 0.5; letter-spacing: 1.5px;
        }

        .hero-text {
            display: flex; flex-direction: column; align-items: center;
            text-align: center; padding: 140px 0 60px 0;
        }
        .hero-text h1 { 
            font-family: 'Playfair Display', serif; font-size: 3.5rem; 
            margin: 0 0 35px 0; color: black; 
        }
        .hero-text p { 
            max-width: 320px; margin: 0 auto; line-height: 1.6; font-size: 1rem; color: black;
        }

        .section-container {
            position: relative;
            width: 100%;
            height: 90vh; 
            margin-bottom: 180px; /* Increased section gap */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .section-container video, .section-container img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%; 
            object-fit: cover;
            z-index: 1;
        }

        .overlay-content {
            position: relative;
            z-index: 10; 
            text-align: center;
            color: white;
            width: 90%;
        }

        /* MASSIVE SPACING FOR WORDS */
        .overlay-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: 3.8rem;
            margin: 0 0 70px 0; /* Huge gap between Title and Subtitle */
            text-shadow: 2px 2px 20px rgba(0,0,0,0.5);
        }

        .overlay-content p {
            font-size: 1.2rem;
            margin: 0 0 100px 0; /* Massive gap between Subtitle and Button */
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* REMOVED BOUNDARY: Clean underlined text button */
        .mini-btn {
            display: inline-block;
            background: transparent;
            color: white;
            border: none; /* Removed the white boundary/border */
            text-decoration: none;
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 4px;
            border-bottom: 2px solid white; /* Adds a luxury underline instead */
            padding-bottom: 8px;
            transition: 0.3s ease;
        }

        .mini-btn:hover {
            opacity: 0.7;
            letter-spacing: 6px;
        }

        .button-area {
            display: flex; justify-content: center; padding-bottom: 150px;
        }
        .btn { 
            padding: 26px 95px; background: black; color: white; 
            text-decoration: none; border-radius: 60px; font-weight: 600; 
            font-size: 13px; text-transform: uppercase; letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-logo">
            <img src="logo2.png" alt="TALISM">
        </a>
        <div class="nav-links">
            <a href="about.html">About</a>
            <a href="shop.html">Shop</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <div class="hero-text">
        <h1>TALISM</h1>
        <p>Refined fashion and long-lasting fragrances, crafted for everyday elegance.</p>
    </div>

    <div class="section-container">
        <video autoplay loop muted playsinline>
            <source src="stara-video.mp4" type="video/mp4">
        </video>
        <div class="overlay-content">
            <h2>Stara Clothing</h2>
            <p>Modern modesty, redefined.</p>
            <a href="shop.html#clothing" class="mini-btn">Shop Now</a>
        </div>
    </div>

    <div class="section-container">
        <img src="perfume.jpg" alt="Fragrances">
        <div class="overlay-content">
            <h2>Signature Scents</h2>
            <p>Memorable, long-lasting aromas.</p>
            <a href="shop.html#perfumes" class="mini-btn">Shop Now</a>
        </div>
    </div>

    <div class="button-area">
        <a href="shop.html" class="btn">Explore Collections</a>
    </div>

</body>
</html>
