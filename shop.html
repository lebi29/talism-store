<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TALISM | Shop</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap');
        body { margin: 0; font-family: 'Inter', sans-serif; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; border-bottom: 1px solid #eee; }
        .logo { font-family: 'Playfair Display', serif; font-size: 22px; text-decoration: none; color: #000; font-weight: bold; }
        .nav-links a { text-decoration: none; color: #666; margin-left: 15px; font-size: 11px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; padding: 20px; }
        .card { border: 1px solid #eee; padding: 30px; border-radius: 15px; text-align: center; }
        .card h3 { font-family: 'Playfair Display', serif; margin: 10px 0; }
        .price { color: #ec4899; font-weight: bold; }
    </style>
</head>
<body>
    <nav style="display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: white; border-bottom: 1px solid #f0f0f0; position: sticky; top: 0; z-index: 100;">
    <a href="index.html" style="display: flex; align-items: center; text-decoration: none;">
        <img src="logo.png" alt="TALISM Logo" style="height: 45px; width: auto;">
    </a>

    <div style="display: flex; gap: 12px;">
        <a href="index.html" style="text-decoration: none; color: #555; font-size: 10px; text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px;">Home</a>
        <a href="about.html" style="text-decoration: none; color: #555; font-size: 10px; text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px;">About</a>
        <a href="shop.html" style="text-decoration: none; color: #555; font-size: 10px; text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px;">Shop</a>
        <a href="contact.html" style="text-decoration: none; color: #555; font-size: 10px; text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px;">Contact</a>
    </div>
    </nav>
    <div class="grid">
        <div class="card"><h3>Stara Clothing</h3><p class="price">$120</p></div>
        <div class="card"><h3>Minimalist Bags</h3><p class="price">$250</p></div>
        <div class="card" style="background:#111; color:#fff;"><h3>Luxury Perfumes</h3><p class="price">$85</p></div>
    </div>
</body>
</html>
