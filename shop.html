<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TALISM | Shop Our Collection</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');
        
        body { margin: 0; font-family: 'Inter', sans-serif; background-color: #F4EBEB; color: #333; }

        /* --- TOOLBAR --- */
        nav {
            display: grid; grid-template-columns: 1fr 2fr 1fr; align-items: center;
            padding: 0 15px; position: fixed; top: 0; left: 0; right: 0; z-index: 3000;
            background-color: #E9CDCE; height: 75px; 
        }
        .nav-center { display: flex; justify-content: center; }
        .nav-logo img { height: 32px; width: auto; } 
        .icon-btn { color: #000; font-size: 22px; cursor: pointer; background: none; border: none; padding: 5px; }

        /* --- SEARCH OVERLAY --- */
        #search-bar {
            position: fixed; top: -100px; left: 0; width: 100%; height: 75px;
            background: #fff; z-index: 4000; transition: 0.4s;
            display: flex; align-items: center; padding: 0 20px; box-sizing: border-box;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        #search-bar.active { top: 0; }
        #search-bar input {
            flex: 1; border: none; outline: none; font-size: 16px; padding: 10px;
        }
        .close-search { font-size: 24px; cursor: pointer; margin-left: 15px; }

        /* --- CONTENT STYLING --- */
        header { text-align: center; padding: 130px 20px 40px; }
        header h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 0 5% 100px; }
        .card { background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        .product-img { width: 100%; height: 350px; object-fit: cover; }
        .card-info { padding: 25px; }
        .wa-order-btn { display: inline-block; background-color: #25D366; color: white; text-decoration: none; padding: 12px 25px; border-radius: 50px; font-size: 11px; font-weight: 600; text-transform: uppercase; }

        #mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 3500; display: none; }
    </style>
</head>
<body>

    <div id="search-bar">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="Search for perfumes, clothing..." id="search-input">
        <span class="close-search" onclick="toggleSearch()">&times;</span>
    </div>

    <div id="mask" onclick="toggleSearch()"></div>

    <nav>
        <div class="nav-left"><button class="icon-btn"><i class="fa-solid fa-bars"></i></button></div>
        <div class="nav-center">
            <a href="index.html" class="nav-logo"><img src="logo2.png" alt="TALISM"></a>
        </div>
        <div class="nav-right">
            <button class="icon-btn" onclick="toggleSearch()"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
    </nav>

    <header>
        <h1>Our Collection</h1>
        <p>Elegance in every detail.</p>
    </header>

    <div class="grid">
        <div class="card">
            <img src="stara-image.jpg" alt="Stara Clothing" class="product-img">
            <div class="card-info">
                <h3>Stara Clothing</h3>
                <span style="color:#A978C9; font-weight:600;">TZS 85,000</span><br><br>
                <a href="https://wa.me/255684143537" class="wa-order-btn"><i class="fab fa-whatsapp"></i> Order on WhatsApp</a>
            </div>
        </div>
    </div>

    <script>
        function toggleSearch() {
            const searchBar = document.getElementById('search-bar');
            const mask = document.getElementById('mask');
            searchBar.classList.toggle('active');
            mask.style.display = searchBar.classList.contains('active') ? 'block' : 'none';
            if(searchBar.classList.contains('active')) document.getElementById('search-input').focus();
        }
    </script>
</body>
</html>
